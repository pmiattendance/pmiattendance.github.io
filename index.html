<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PMI Tools Dashboard</title>
<style>
/* ===== PREMIUM THEME - MATERIAL DESIGN INSPIRED ===== */
:root {
  --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 60%, #f093fb 100%);
  --surface: #ffffff;
  --surface-alt: #f8fafc;
  --text-primary: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --border-focus: #818cf8;
  --primary: #6366f1;
  --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
  --primary-hover: #4f46e5;
  --success: #10b981;
  --success-gradient: linear-gradient(135deg, #10b981, #22c55e);
  --danger: #ef4444;
  --danger-gradient: linear-gradient(135deg, #ef4444, #f97316);
  --warning: #f59e0b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 14px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
  --shadow-glow: 0 0 0 3px rgba(99, 102, 241, 0.15);
  --radius: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --elevation-1: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
  --elevation-2: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23);
  --elevation-3: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
}
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent; 
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: var(--bg-gradient);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-bottom: env(safe-area-inset-bottom);
  display: flex;
  flex-direction: column;
}
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  position: relative;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  width: 100%;
}
@media (min-width: 768px) {
  #app {
    min-height: auto;
    margin: 24px auto;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    max-height: 92vh;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
}
.header {
  padding: 24px 22px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 20;
  text-align: center;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.025em;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  line-height: 1.3;
}
.header-subtitle {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: 4px;
  letter-spacing: -0.01em;
}
.footer-credit {
  position: fixed; 
  bottom: 12px; 
  right: 16px; 
  font-size: 0.75rem; 
  font-weight: 700;
  color: var(--text-secondary); 
  background: rgba(255,255,255,0.92);
  padding: 6px 14px; 
  border-radius: 12px; 
  box-shadow: var(--shadow-sm); 
  z-index: 100;
  bottom: calc(12px + env(safe-area-inset-bottom));
  border: 1px solid var(--border);
  backdrop-filter: blur(4px);
}
.content {
  flex: 1; 
  padding: 16px 20px 32px; 
  overflow-y: auto;
  -webkit-overflow-scrolling: touch; 
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 140px);
}
@media (min-width: 768px) {
  .content {
    min-height: auto;
    padding: 24px 24px 40px;
  }
}
.dashboard { 
  display: grid; 
  gap: 18px; 
  width: 100%;
  max-width: 400px;
  padding: 8px 0;
}
.action-card {
  background: var(--surface); 
  border: 1px solid var(--border); 
  border-radius: var(--radius);
  padding: 26px 24px; 
  cursor: pointer; 
  transition: var(--transition-slow);
  display: flex; 
  align-items: center; 
  gap: 20px; 
  position: relative; 
  overflow: hidden; 
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  color: inherit;
  width: 100%;
}
.action-card::before {
  content: ''; 
  position: absolute; 
  top: 0; 
  left: 0; 
  right: 0; 
  height: 3px;
  background: var(--primary-gradient); 
  opacity: 0; 
  transition: var(--transition);
}
.action-card.attendance::before { 
  background: var(--success-gradient); 
}
.action-card.feed-marks::before { 
  background: linear-gradient(135deg, #3b82f6, #6366f1); 
}
.action-card:hover { 
  border-color: var(--border-focus); 
  box-shadow: var(--shadow); 
  transform: translateY(-3px); 
}
.action-card:hover::before { 
  opacity: 1; 
}
.action-card:active { 
  transform: translateY(-1px); 
  box-shadow: var(--shadow-sm); 
}
.action-icon {
  width: 60px; 
  height: 60px; 
  border-radius: 18px; 
  display: flex;
  align-items: center; 
  justify-content: center; 
  font-size: 1.8rem; 
  flex-shrink: 0; 
  position: relative;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}
.action-card.attendance .action-icon {
  background: linear-gradient(135deg, #d1fae5, #6ee7b7); 
  color: #065f46;
  box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
}
.action-card.feed-marks .action-icon {
  background: linear-gradient(135deg, #dbeafe, #93c5fd); 
  color: #1e40af;
  box-shadow: 0 6px 16px rgba(59, 130, 246, 0.35);
}
.action-content h3 { 
  font-size: 1.25rem; 
  font-weight: 700; 
  margin-bottom: 6px; 
  color: var(--text-primary); 
  letter-spacing: -0.01em;
}
.action-content p { 
  color: var(--text-secondary); 
  font-size: 0.95rem; 
  line-height: 1.45; 
  font-weight: 500;
}
.btn {
  padding: 16px 24px; 
  border: none; 
  border-radius: 14px; 
  font-weight: 600; 
  font-size: 1.02rem;
  cursor: pointer; 
  transition: var(--transition); 
  display: inline-flex;
  align-items: center; 
  justify-content: center; 
  gap: 8px; 
  position: relative; 
  overflow: hidden;
  text-decoration: none;
  width: 100%;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}
.btn::after { 
  content: ''; 
  position: absolute; 
  inset: 0; 
  background: rgba(255,255,255,0.12); 
  opacity: 0; 
  transition: var(--transition); 
}
.btn:active::after { 
  opacity: 1; 
}
.btn-attendance {
  background: var(--success-gradient); 
  color: white;
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
}
.btn-attendance:hover {
  background: linear-gradient(135deg, #059669, #16a34a);
  transform: translateY(-2px); 
  box-shadow: 0 8px 25px rgba(16, 185, 129, 0.55);
}
.btn-attendance:active { 
  transform: translateY(0); 
}
.btn-feed-marks {
  background: linear-gradient(135deg, #3b82f6, #6366f1); 
  color: white;
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
}
.btn-feed-marks:hover {
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  transform: translateY(-2px); 
  box-shadow: 0 8px 25px rgba(99, 102, 241, 0.55);
}
.btn-feed-marks:active { 
  transform: translateY(0); 
}
.sliding-text-container {
  overflow: hidden; 
  white-space: nowrap; 
  background: var(--primary-gradient);
  padding: 8px 0; 
  margin: 16px 0 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 400px;
}
.sliding-text {
  display: inline-block; 
  color: white; 
  font-size: 1.05rem; 
  font-weight: 700;
  letter-spacing: 0.18em; 
  animation: slideText 18s linear infinite; 
  padding-left: 100%;
  text-transform: uppercase;
}
@keyframes slideText { 
  0% { transform: translateX(0); } 
  100% { transform: translateX(-100%); } 
}
.hidden { display: none !important; }

/* Mobile optimizations */
@media (max-width: 480px) {
  .header { padding: 20px 16px 12px; }
  .header h1 { font-size: 1.4rem; }
  .header-subtitle { font-size: 1.1rem; }
  .content { padding: 12px 16px 28px; }
  .action-card { padding: 22px 20px; }
  .action-icon { width: 54px; height: 54px; font-size: 1.6rem; }
  .action-content h3 { font-size: 1.15rem; }
  .action-content p { font-size: 0.92rem; }
  .footer-credit { 
    bottom: calc(8px + env(safe-area-inset-bottom)); 
    right: 12px; 
    font-size: 0.7rem; 
    padding: 5px 10px;
  }
  .dashboard { gap: 14px; }
  .sliding-text-container { margin: 12px 0 16px; padding: 7px 0; }
  .sliding-text { font-size: 0.95rem; letter-spacing: 0.15em; }
}

/* Animation for page load */
@keyframes fadeInUp {
  from { 
    opacity: 0; 
    transform: translateY(20px); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0); 
  }
}
.content {
  animation: fadeInUp 0.4s ease-out forwards;
}
.action-card {
  animation: fadeInUp 0.3s ease-out forwards;
  animation-delay: 0.1s;
}
.action-card:nth-child(2) {
  animation-delay: 0.2s;
}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <h1>Pravin More's Institute</h1>
    <div class="header-subtitle">PMI Tools Dashboard</div>
  </header>
  
  <div class="sliding-text-container">
    <div class="sliding-text">PRAVIN MORE INSTITUTE</div>
  </div>
  
  <main class="content">
    <div class="dashboard">
      <a href="https://pmiattendance.github.io/attendance/attendance" class="action-card attendance" role="button" tabindex="0">
        <div class="action-icon">📋</div>
        <div class="action-content">
          <h3>Attendance</h3>
          <p>Mark and track student attendance</p>
        </div>
      </a>
      
      <a href="https://pmiattendance.github.io/attendance/marks" class="action-card feed-marks" role="button" tabindex="0">
        <div class="action-icon">✏️</div>
        <div class="action-content">
          <h3>Feed Marks</h3>
          <p>Enter and manage student marks</p>
        </div>
      </a>
    </div>
  </main>
  
  <div class="footer-credit">Created by Bhavesh Pawar</div>
</div>

<script>
// Enhanced mobile touch interactions
document.addEventListener('DOMContentLoaded', () => {
  // Add ripple effect to buttons on click
  document.querySelectorAll('.action-card, .btn').forEach(element => {
    element.addEventListener('click', function(e) {
      // Create ripple element
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      
      // Position ripple at click position
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = e.clientX - rect.left - size/2;
      const y = e.clientY - rect.top - size/2;
      
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      
      this.appendChild(ripple);
      
      // Remove ripple after animation
      setTimeout(() => {
        ripple.remove();
      }, 600);
    });
  });
  
  // Add keyboard navigation support
  document.querySelectorAll('.action-card').forEach(card => {
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        card.click();
      }
    });
  });
  
  // Prevent zoom on double-tap for mobile
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(event) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, false);
  
  // Smooth scroll behavior for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    });
  });
  
  // Add subtle animation on scroll for content
  const observerOptions = {
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
  };
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
        observer.unobserve(entry.target);
      }
    });
  }, observerOptions);
  
  // Observe dashboard cards
  document.querySelectorAll('.action-card').forEach(card => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(15px)';
    card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    observer.observe(card);
  });
});

// Handle window resize for responsive adjustments
window.addEventListener('resize', () => {
  // Adjust footer position on orientation change
  const footer = document.querySelector('.footer-credit');
  if (window.innerWidth < 480) {
    footer.style.fontSize = '0.7rem';
    footer.style.padding = '5px 10px';
  } else {
    footer.style.fontSize = '0.75rem';
    footer.style.padding = '6px 14px';
  }
});
</script>
</body>
</html>
